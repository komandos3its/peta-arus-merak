<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Peta Arus Merak</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;}

#map{
height:100vh;
}

.legend{
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:10px;
font-size:14px;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// buat peta
var map = L.map('map').setView([-5.9,105.9],10);

// basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);


// load geojson
fetch("arus_merak_web.geojson")
.then(res=>res.json())
.then(data=>{

let speeds=[]

// hitung semua speed
data.features.forEach(f=>{
let u=f.properties.u
let v=f.properties.v
let s=Math.sqrt(u*u+v*v)
speeds.push(s)
})

let minSpeed=Math.min(...speeds)
let maxSpeed=Math.max(...speeds)


// fungsi warna
function getColor(speed){

let t=(speed-minSpeed)/(maxSpeed-minSpeed)

let r=Math.floor(255*t)
let g=Math.floor(180*(1-t))
let b=Math.floor(255*(1-t))

return `rgb(${r},${g},${b})`
}


// gambar panah
data.features.forEach(f=>{

let lat=f.geometry.coordinates[1]
let lon=f.geometry.coordinates[0]

let u=f.properties.u
let v=f.properties.v

let speed=Math.sqrt(u*u+v*v)

let mag=Math.sqrt(u*u+v*v)

let ux=u/mag
let vy=v/mag

let scale=0.04

let lat2=lat+vy*scale
let lon2=lon+ux*scale

let color=getColor(speed)

L.polyline([
[lat,lon],
[lat2,lon2]
],{
color:color,
weight:2
}).addTo(map)

})

})

</script>

</body>
</html>
