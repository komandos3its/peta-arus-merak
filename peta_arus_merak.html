<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Peta Arus Merak</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// buat peta
var map = L.map('map').setView([-5.9,105.9],10);

// basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'OpenStreetMap'
}).addTo(map);

// load geojson
fetch("arus_merak_web.geojson")
.then(res=>res.json())
.then(data=>{

data.features.forEach(f=>{

let lat = f.geometry.coordinates[1];
let lon = f.geometry.coordinates[0];

let u = f.properties.u;
let v = f.properties.v;

// hitung arah
let angle = Math.atan2(v,u);

// panjang panah
let scale = 0.05;

let lat2 = lat + v*scale;
let lon2 = lon + u*scale;

// gambar panah
L.polyline([
[lat,lon],
[lat2,lon2]
],{
color:"red",
weight:2
}).addTo(map);

});

});

</script>

</body>
</html>
